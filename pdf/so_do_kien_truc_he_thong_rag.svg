<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="950" viewBox="0 0 1600 950">
  <defs>
    <style>
      .title { font: 700 34px Arial, sans-serif; fill: #172033; }
      .subtitle { font: 400 18px Arial, sans-serif; fill: #526070; }
      .lane-title { font: 700 20px Arial, sans-serif; fill: #253044; }
      .box-title { font: 700 18px Arial, sans-serif; fill: #152033; }
      .box-text { font: 400 14px Arial, sans-serif; fill: #39485a; }
      .small { font: 400 13px Arial, sans-serif; fill: #526070; }
      .box { rx: 14; ry: 14; stroke-width: 2; }
      .data { fill: #eef7f2; stroke: #38a169; }
      .process { fill: #eef5ff; stroke: #3182ce; }
      .store { fill: #fff7ed; stroke: #dd6b20; }
      .model { fill: #f6f0ff; stroke: #805ad5; }
      .memory { fill: #fff1f2; stroke: #e11d48; }
      .output { fill: #f0fdfa; stroke: #0f766e; }
      .arrow { stroke: #334155; stroke-width: 2.3; fill: none; marker-end: url(#arrowhead); }
      .dash { stroke-dasharray: 8 7; }
      .note { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; rx: 10; ry: 10; }
    </style>
    <marker id="arrowhead" markerWidth="12" markerHeight="8" refX="10" refY="4" orient="auto">
      <path d="M0,0 L12,4 L0,8 Z" fill="#334155"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1600" height="950" fill="#f8fafc"/>

  <text x="70" y="64" class="title">Sơ đồ kiến trúc hệ thống RAG tư vấn thuốc nông nghiệp</text>
  <text x="70" y="94" class="subtitle">Luồng xây dựng dữ liệu, tạo vector, truy xuất Qdrant, sinh câu trả lời bằng LLM và ghi nhớ hội thoại bằng Redis</text>

  <rect x="45" y="130" width="1510" height="265" rx="18" fill="#ffffff" stroke="#d9e2ec" stroke-width="2"/>
  <text x="70" y="165" class="lane-title">A. Xây dựng cơ sở tri thức và vector database</text>

  <rect x="80" y="205" width="190" height="105" class="box data"/>
  <text x="105" y="237" class="box-title">Dữ liệu thô</text>
  <text x="105" y="263" class="box-text">data.csv</text>
  <text x="105" y="285" class="box-text">Tên thuốc, giá, ảnh,</text>
  <text x="105" y="305" class="box-text">mô tả từ web</text>

  <rect x="320" y="205" width="210" height="105" class="box process"/>
  <text x="345" y="237" class="box-title">Tiền xử lý</text>
  <text x="345" y="263" class="box-text">Làm sạch tiếng Việt</text>
  <text x="345" y="285" class="box-text">Chuẩn hóa trường</text>
  <text x="345" y="305" class="box-text">data_enriched.json</text>

  <rect x="580" y="205" width="230" height="105" class="box process"/>
  <text x="605" y="237" class="box-title">Làm giàu dữ liệu</text>
  <text x="605" y="263" class="box-text">rule_key, đặc tính bệnh</text>
  <text x="605" y="285" class="box-text">giai đoạn phù hợp</text>
  <text x="605" y="305" class="box-text">lý do chuyên gia</text>

  <rect x="860" y="205" width="210" height="105" class="box data"/>
  <text x="885" y="237" class="box-title">Cơ sở tri thức</text>
  <text x="885" y="263" class="box-text">Thuoc_Metadata</text>
  <text x="885" y="285" class="box-text">Tách theo loại</text>
  <text x="885" y="305" class="box-text">500 sản phẩm</text>

  <rect x="1120" y="205" width="170" height="105" class="box process"/>
  <text x="1145" y="237" class="box-title">Chunking</text>
  <text x="1145" y="263" class="box-text">chunks.json</text>
  <text x="1145" y="285" class="box-text">chunks.jsonl</text>
  <text x="1145" y="305" class="box-text">1000 chunks</text>

  <rect x="1340" y="205" width="165" height="105" class="box model"/>
  <text x="1365" y="237" class="box-title">Embedding</text>
  <text x="1365" y="263" class="box-text">4 models</text>
  <text x="1365" y="285" class="box-text">Vector hóa chunks</text>
  <text x="1365" y="305" class="box-text">768/1024 chiều</text>

  <rect x="1120" y="340" width="385" height="38" class="box store"/>
  <text x="1145" y="365" class="box-title">Qdrant local: data/qdrant_db/ - 4 collection vector</text>

  <path d="M270 258 L320 258" class="arrow"/>
  <path d="M530 258 L580 258" class="arrow"/>
  <path d="M810 258 L860 258" class="arrow"/>
  <path d="M1070 258 L1120 258" class="arrow"/>
  <path d="M1290 258 L1340 258" class="arrow"/>
  <path d="M1422 310 L1422 340" class="arrow"/>

  <rect x="45" y="430" width="1510" height="385" rx="18" fill="#ffffff" stroke="#d9e2ec" stroke-width="2"/>
  <text x="70" y="465" class="lane-title">B. Luồng hỏi đáp RAG có bộ nhớ hội thoại</text>

  <rect x="80" y="515" width="190" height="100" class="box output"/>
  <text x="105" y="547" class="box-title">Người dùng</text>
  <text x="105" y="573" class="box-text">Nhập câu hỏi</text>
  <text x="105" y="595" class="box-text">Ví dụ: cây vàng lá</text>

  <rect x="320" y="515" width="210" height="100" class="box model"/>
  <text x="345" y="547" class="box-title">Query encoder</text>
  <text x="345" y="573" class="box-text">Mã hóa câu hỏi</text>
  <text x="345" y="595" class="box-text">thành vector</text>

  <rect x="580" y="515" width="230" height="100" class="box store"/>
  <text x="605" y="547" class="box-title">Qdrant retrieval</text>
  <text x="605" y="573" class="box-text">Tìm top-k chunks</text>
  <text x="605" y="595" class="box-text">liên quan nhất</text>

  <rect x="860" y="515" width="240" height="100" class="box process"/>
  <text x="885" y="547" class="box-title">Tạo prompt RAG</text>
  <text x="885" y="573" class="box-text">Instruction + context</text>
  <text x="885" y="595" class="box-text">+ history + question</text>

  <rect x="1150" y="515" width="190" height="100" class="box model"/>
  <text x="1175" y="547" class="box-title">LLM</text>
  <text x="1175" y="573" class="box-text">Qwen2.5-3B</text>
  <text x="1175" y="595" class="box-text">Qwen3-4B</text>

  <rect x="1385" y="515" width="135" height="100" class="box output"/>
  <text x="1405" y="547" class="box-title">Trả lời</text>
  <text x="1405" y="573" class="box-text">Tư vấn</text>
  <text x="1405" y="595" class="box-text">có căn cứ</text>

  <rect x="860" y="675" width="240" height="85" class="box memory"/>
  <text x="885" y="707" class="box-title">Redis memory</text>
  <text x="885" y="733" class="box-text">rag_chat:&lt;session_id&gt;</text>
  <text x="885" y="753" class="box-text">Lưu user/assistant gần nhất</text>

  <rect x="1165" y="675" width="355" height="85" class="note"/>
  <text x="1190" y="707" class="box-title">Nguyên tắc chống bịa</text>
  <text x="1190" y="733" class="box-text">LLM chỉ trả lời dựa trên context truy xuất.</text>
  <text x="1190" y="753" class="box-text">Nếu thiếu giá/liều lượng/an toàn thì nói chưa đủ dữ liệu.</text>

  <path d="M270 565 L320 565" class="arrow"/>
  <path d="M530 565 L580 565" class="arrow"/>
  <path d="M810 565 L860 565" class="arrow"/>
  <path d="M1100 565 L1150 565" class="arrow"/>
  <path d="M1340 565 L1385 565" class="arrow"/>
  <path d="M1452 615 L1452 650 C1452 690 1140 690 1100 690" class="arrow dash"/>
  <path d="M980 675 L980 615" class="arrow dash"/>
  <path d="M980 760 L980 790 C980 825 175 825 175 615" class="arrow dash"/>

  <rect x="45" y="850" width="1510" height="58" rx="16" fill="#172033"/>
  <text x="70" y="884" style="font: 700 18px Arial, sans-serif; fill: #ffffff;">Tóm tắt:</text>
  <text x="165" y="884" style="font: 400 17px Arial, sans-serif; fill: #e5edf5;">Embedding + Qdrant giúp tìm đúng dữ liệu; LLM giúp diễn giải thành câu trả lời; Redis giúp nhớ ngữ cảnh hội thoại.</text>
</svg>
